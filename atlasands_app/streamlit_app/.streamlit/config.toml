[theme]
base = "dark"
primaryColor = "#D4AF37"
backgroundColor = "#0A0A0F"
secondaryBackgroundColor = "#13131C"
textColor = "#F5F1E8"
font = "serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[client]
showErrorDetails = true
toolbarMode = "minimal"
